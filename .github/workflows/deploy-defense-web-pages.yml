name: Deploy Crypto Issuance Defense Web

on:
  push:
    branches:
      - main
      - master
      - codex/**
    paths:
      - ".github/workflows/deploy-defense-web-pages.yml"
      - "defense-web/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: defense-web-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: defense-web/package-lock.json

      - name: Install dependencies
        working-directory: defense-web
        run: npm ci

      - name: Build
        working-directory: defense-web
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: defense-web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
